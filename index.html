<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Now Playing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    color: #111;
    font-family: Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  #app {
    width: 100%;
    max-width: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Setup */
  #setup { width: 100%; display: none; flex-direction: column; gap: 14px; }

  #setup p { font-size: 0.8rem; color: #888; line-height: 1.6; }
  #setup a { color: #111; }

  #setup input {
    width: 100%;
    border: none;
    border-bottom: 1px solid #ccc;
    font-family: Georgia, serif;
    font-size: 0.9rem;
    padding: 6px 0;
    outline: none;
    color: #111;
  }

  #setup input:focus { border-bottom-color: #111; }

  #saveBtn {
    background: none;
    border: 1px solid #111;
    font-family: Georgia, serif;
    font-size: 0.85rem;
    padding: 8px 20px;
    cursor: pointer;
    align-self: flex-start;
  }

  #saveBtn:hover { background: #111; color: #fff; }

  /* Player */
  #player { width: 100%; display: none; flex-direction: column; align-items: center; gap: 16px; }

  #username-label { font-size: 0.7rem; color: #aaa; letter-spacing: 0.1em; align-self: flex-start; }

  #cover {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: none;
  }

  #cover-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: #ddd;
  }

  #info { width: 100%; border-top: 1px solid #eee; padding-top: 14px; }

  #track { font-size: 1.1rem; margin-bottom: 4px; }
  #artist { font-size: 0.85rem; color: #555; margin-bottom: 2px; }
  #album { font-size: 0.75rem; color: #aaa; font-style: italic; }

  #nothing { font-size: 0.85rem; color: #aaa; font-style: italic; text-align: center; }

  #footer {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #footer span { font-size: 0.65rem; color: #ccc; }

  #settings-btn {
    background: none;
    border: none;
    font-family: Georgia, serif;
    font-size: 0.65rem;
    color: #ccc;
    cursor: pointer;
    padding: 0;
  }

  #settings-btn:hover { color: #111; }

  #error { font-size: 0.75rem; color: #c0392b; text-align: center; }
</style>
</head>
<body>
<div id="app">

  <div id="setup">
    <p>Coloque seu <strong>username</strong> do Last.fm.<br>
    Não tem conta? <a href="https://www.last.fm/join" target="_blank">last.fm/join</a></p>
    <input type="text" id="username-input" placeholder="seu username" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="saveBtn">entrar</button>
    <div id="setup-error" style="font-size:0.75rem;color:#c0392b;"></div>
  </div>

  <div id="player">
    <span id="username-label"></span>
    <div id="cover-placeholder">♪</div>
    <img id="cover" alt="capa do álbum">
    <div id="info" style="display:none">
      <div id="track"></div>
      <div id="artist"></div>
      <div id="album"></div>
    </div>
    <div id="nothing" style="display:none">nada tocando agora.</div>
    <div id="footer">
      <span id="last-update"></span>
      <button id="settings-btn">trocar usuário</button>
    </div>
    <div id="error"></div>
  </div>

</div>
<script>
  const API_KEY = '522e851180bb217889ddb78f99a76138';

  let username = localStorage.getItem('lfm_user') || '';
  let timer = null;

  username ? showPlayer() : showSetup();

  document.getElementById('saveBtn').onclick = () => {
    const u = document.getElementById('username-input').value.trim();
    if (!u) { document.getElementById('setup-error').textContent = 'coloca um username.'; return; }
    username = u;
    localStorage.setItem('lfm_user', u);
    showPlayer();
  };

  document.getElementById('settings-btn').onclick = () => {
    clearInterval(timer);
    showSetup();
  };

  function showSetup() {
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('player').style.display = 'none';
  }

  function showPlayer() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('player').style.display = 'flex';
    document.getElementById('username-label').textContent = username;
    fetch_track();
    clearInterval(timer);
    timer = setInterval(fetch_track, 30000);
  }

  async function fetch_track() {
    const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${encodeURIComponent(username)}&api_key=${API_KEY}&format=json&limit=1`;
    try {
      const r = await fetch(url);
      const d = await r.json();
      if (d.error) { document.getElementById('error').textContent = d.message; return; }
      document.getElementById('error').textContent = '';
      const tracks = d.recenttracks?.track;
      if (!tracks || !tracks.length) { show_nothing(); return; }
      const t = Array.isArray(tracks) ? tracks[0] : tracks;
      if (t['@attr']?.nowplaying !== 'true') { show_nothing(); return; }

      const name = t.name || '—';
      const artist = t.artist?.['#text'] || '—';
      const album = t.album?.['#text'] || '';
      const imgs = t.image || [];
      let art = '';
      for (const i of [...imgs].reverse()) {
        if (i['#text']?.trim()) { art = i['#text']; break; }
      }

      document.getElementById('track').textContent = name;
      document.getElementById('artist').textContent = artist;
      document.getElementById('album').textContent = album;
      document.getElementById('info').style.display = 'block';
      document.getElementById('nothing').style.display = 'none';

      const cover = document.getElementById('cover');
      const ph = document.getElementById('cover-placeholder');
      if (art) {
        cover.src = art;
        cover.style.display = 'block';
        ph.style.display = 'none';
        cover.onerror = () => { cover.style.display = 'none'; ph.style.display = 'flex'; };
      } else {
        cover.style.display = 'none';
        ph.style.display = 'flex';
      }

      const now = new Date();
      document.getElementById('last-update').textContent =
        `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

    } catch(e) {
      document.getElementById('error').textContent = 'erro de conexão.';
    }
  }

  function show_nothing() {
    document.getElementById('info').style.display = 'none';
    document.getElementById('nothing').style.display = 'block';
    document.getElementById('cover').style.display = 'none';
    document.getElementById('cover-placeholder').style.display = 'flex';
    const now = new Date();
    document.getElementById('last-update').textContent =
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  }
</script>
</body>
</html>
