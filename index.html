<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #fff;
  width: 600px;
  padding: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
}
#placeholder, #cover {
  width: 560px;
  height: 560px;
  display: block;
  margin: 0 auto;
}
#placeholder {
  background: #f5f5f5;
  border: 1px solid #eee;
  line-height: 560px;
  font-size: 80px;
  color: #ddd;
  text-align: center;
  font-family: 'DM Serif Display', serif;
}
#cover {
  display: none;
  border: 1px solid #eee;
  object-fit: cover;
  -webkit-filter: grayscale(100%);
  filter: grayscale(100%);
}
#infobar {
  width: 560px;
  margin: 14px auto 0 auto;
  display: table;
  table-layout: fixed;
}
#left {
  display: table-cell;
  text-align: left;
  vertical-align: top;
  width: 340px;
}
#right {
  display: table-cell;
  text-align: right;
  vertical-align: top;
  width: 220px;
}
#track {
  font-family: 'DM Serif Display', serif;
  font-size: 1.5em;
  color: #000;
  line-height: 1.25;
}
#artist {
  margin-top: 4px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-size: 1em;
  color: #111;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
#status {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 1.4em;
  color: #111;
  white-space: nowrap;
}
#weather {
  margin-top: 4px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-size: 0.85em;
  color: #111;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}
</style>

var API_KEY = '522e851180bb217889ddb78f99a76138';
var USER = 'maxvbur';
var lastTrack = '';
var weatherCache = '';
var weatherLastFetch = 0;

function hiRes(url) {
  if (!url) return '';
  return url.replace(/\/i\/u\/\d+x\d+\//, '/i/u/770x770/');
}

function now() {
  var d = new Date();
  var utc = d.getTime() + d.getTimezoneOffset() * 60000;
  var br = new Date(utc - 3 * 3600000);
  var h = br.getHours(); var m = br.getMinutes();
  return (h<10?'0'+h:h)+':'+(m<10?'0'+m:m);
}

function randomFallback() {
  return FALLBACKS[Math.floor(Math.random() * FALLBACKS.length)];
}

function showFallback() {
  var cover = document.getElementById('cover');
  var ph = document.getElementById('placeholder');
  cover.onload = null;
  cover.onerror = null;
  cover.src = randomFallback();
  cover.style.display = 'block';
  ph.style.display = 'none';
}

function loadCover(src, fallback) {
  var cover = document.getElementById('cover');
  var ph = document.getElementById('placeholder');
  cover.onload = function() {
    cover.style.display = 'block';
    ph.style.display = 'none';
  };
  cover.onerror = function() {
    if (fallback && src !== fallback) {
      cover.onerror = function() { showFallback(); };
      cover.src = fallback;
    } else {
      showFallback();
    }
  };
  cover.src = src;
}

function fetchWeather() {
  var t = Date.now();
  if (weatherCache && t - weatherLastFetch < 10 * 60 * 1000) {
    document.getElementById('weather').innerHTML = weatherCache;
    return;
  }
  var url = 'https://api.open-meteo.com/v1/forecast?latitude=-23.55&longitude=-46.63&current_weather=true';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4 || xhr.status !== 200) return;
    var d;
    try { d = JSON.parse(xhr.responseText); } catch(e) { return; }
    var cw = d.current_weather;
    if (!cw) return;
    var temp = Math.round(cw.temperature);
    weatherCache = weatherIcon(cw.weathercode) + ' ' + temp + 'C';
    weatherLastFetch = Date.now();
    document.getElementById('weather').innerHTML = weatherCache;
  };
  xhr.send();
}

function weatherIcon(code) {
  if (code === 0) return 'sol';
  if (code <= 2) return 'nublado';
  if (code === 3) return 'fechado';
  if (code <= 49) return 'neblina';
  if (code <= 59) return 'garoa';
  if (code <= 69) return 'chuva';
  if (code <= 79) return 'neve';
  if (code <= 82) return 'chuva';
  if (code <= 84) return 'granizo';
  if (code <= 99) return 'trovoada';
  return '';
}

function update() {
  document.getElementById('status').innerHTML = now();
  fetchWeather();

  var url = 'https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks'
    + '&user=' + USER
    + '&api_key=' + API_KEY
    + '&format=json&limit=1';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) return;
    var d;
    try { d = JSON.parse(xhr.responseText); } catch(e) { return; }

    var tracks = d.recenttracks && d.recenttracks.track;
    if (!tracks) return;
    var t = tracks.length ? tracks[0] : tracks;

    var playing = t['@attr'] && t['@attr'].nowplaying === 'true';
    if (!playing) {
      document.getElementById('track').innerHTML = 'nada tocando';
      document.getElementById('artist').innerHTML = '';
      showFallback();
      lastTrack = '';
      return;
    }

    var name = t.name || '';
    var artist = (t.artist && t.artist['#text']) || '';
    var key = name + '|' + artist;
    if (key === lastTrack) return;
    lastTrack = key;

    document.getElementById('track').innerHTML = name;
    document.getElementById('artist').innerHTML = artist;

    var imgs = t.image || [];
    var art = '';
    for (var i = imgs.length - 1; i >= 0; i--) {
      if (imgs[i]['#text'] && imgs[i]['#text'] !== '') { art = imgs[i]['#text']; break; }
    }

    var LASTFM_DEFAULT = '2a96cbd8b46e442fc41c2b86b821562f.png';
    if (art && art.indexOf(LASTFM_DEFAULT) === -1) {
      loadCover(hiRes(art), art);
    } else {
      document.getElementById('cover').style.display = 'none';
      document.getElementById('placeholder').style.display = 'block';
    }
  };
  xhr.send();
}

update();
setInterval(update, 5000);
</script>
