<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Now Playing</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #fff;
  font-family: Georgia, serif;
  text-align: center;
  padding: 10px 10px 6px 10px;
}
#placeholder, #cover {
  width: 560px;
  height: 560px;
  display: block;
  margin: 0 auto;
}
#placeholder {
  background: #f5f5f5;
  border: 1px solid #eee;
  line-height: 560px;
  font-size: 80px;
  color: #ddd;
}
#cover {
  display: none;
  border: 1px solid #eee;
  object-fit: cover;
}
#track {
  margin-top: 12px;
  font-size: 1.15em;
  color: #111;
  line-height: 1.3;
}
#artist {
  margin-top: 5px;
  font-size: 0.9em;
  color: #555;
}
#status {
  margin-top: 8px;
  font-size: 0.65em;
  color: #bbb;
}
</style>
</head>
<body>

<div id="placeholder">&#9834;</div>
<img id="cover" alt="">
<div id="track"></div>
<div id="artist"></div>
<div id="status">aguardando...</div>

<script>
var API_KEY = '522e851180bb217889ddb78f99a76138';
var USER = 'maxvbur';
var lastTrack = '';

function update() {
  var url = 'https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks'
    + '&user=' + USER
    + '&api_key=' + API_KEY
    + '&format=json&limit=1';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) {
      document.getElementById('status').innerHTML = 'erro ' + xhr.status;
      return;
    }
    var d;
    try { d = JSON.parse(xhr.responseText); } catch(e) { return; }

    var tracks = d.recenttracks && d.recenttracks.track;
    if (!tracks) return;
    var t = tracks.length ? tracks[0] : tracks;

    var playing = t['@attr'] && t['@attr'].nowplaying === 'true';
    if (!playing) {
      document.getElementById('track').innerHTML = 'nada tocando';
      document.getElementById('artist').innerHTML = '';
      document.getElementById('cover').style.display = 'none';
      document.getElementById('placeholder').style.display = 'block';
      document.getElementById('status').innerHTML = now();
      lastTrack = '';
      return;
    }

    var name = t.name || '';
    var artist = (t.artist && t.artist['#text']) || '';
    var key = name + '|' + artist;

    document.getElementById('status').innerHTML = now();

    if (key === lastTrack) return;
    lastTrack = key;

    document.getElementById('track').innerHTML = name;
    document.getElementById('artist').innerHTML = artist;

    var imgs = t.image || [];
    var art = '';
    for (var i = imgs.length - 1; i >= 0; i--) {
      if (imgs[i]['#text'] && imgs[i]['#text'] !== '') { art = imgs[i]['#text']; break; }
    }

    var cover = document.getElementById('cover');
    var ph = document.getElementById('placeholder');
    if (art) {
      cover.src = art;
      cover.style.display = 'block';
      ph.style.display = 'none';
    } else {
      cover.style.display = 'none';
      ph.style.display = 'block';
    }
  };
  xhr.send();
}

function now() {
  var d = new Date();
  var h = d.getHours(); var m = d.getMinutes(); var s = d.getSeconds();
  return (h<10?'0'+h:h)+':'+(m<10?'0'+m:m)+':'+(s<10?'0'+s:s);
}

update();
setInterval(update, 5000);
</script>
</body>
</html>
